<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial;
            background:  radial-gradient(circle, white 40%, #f802f8 70%, #7f0099 100%);
            text-align: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 60px 40px;
            margin: 100px auto;
            width: 900px;
            height: 1000px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: left;
        }

        img {
            width: 120px;
            border-radius: 50%;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        p {
            color: #666;
        }
    </style>
</head>

<body>
    
    <div class="card">
        <h1>Womens Month</h1>
        <p class = "left text">Text</p>
    </div>

</body>
</html>
